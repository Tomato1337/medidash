events {
    worker_connections 1024;
}

http {
    # Proxy for MinIO - allows browser to access minio:9000 via localhost
    # This preserves presigned URL signatures while making them browser-accessible
    server {
        listen 9000;
        server_name minio;

        # Disable buffering for better streaming performance

        location / {
            # Pass request to MinIO without modifying anything
            # This is critical for presigned URLs to work
            proxy_pass http://minio:9000;
            
        }
    }
}
